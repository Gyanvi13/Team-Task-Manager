name: Validate lockfile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies (verify lockfile)
        run: npm ci
